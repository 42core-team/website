image:
  repository: frontend
  tag: local
  pullPolicy: IfNotPresent

imagePullSecrets: []

fullnameOverride: "frontend"

serviceAccount:
  create: false

ingress:
  enabled: false

service:
  type: ClusterIP
  port: 3000

env:
  NODE_ENV: development
  NEXTAUTH_URL: "http://localhost:3000"
  AUTH_COOKIE_NAME: localtoken
  BACKEND_URL: "http://api:4000"
  NEXT_PUBLIC_BACKEND_PUBLIC_URL: "http://localhost:4000"
  NEXT_PUBLIC_VISUALIZER_URL: "https://dev.visualizer.coregame.sh"
  PLAUSIBLE_DOMAIN: localhost
  PLAUSIBLE_CUSTOM_DOMAIN: ""
  CURRENT_BRANCH: dev
  NEXT_PUBLIC_S3_REPLAYS_BUCKET_URL: "http://localhost:9000/core-replays"

secrets:
  NEXTAUTH_SECRET: local-dev-jwt-secret
  # CLIENT_GITHUB_SECRET injected via --set from .env.tilt
  CLIENT_GITHUB_SECRET: ""

resources:
  limits:
    cpu: 8
    memory: 4Gi
  requests:
    cpu: 1
    memory: 1Gi

livenessProbe:
  enabled: false

readinessProbe:
  enabled: false
