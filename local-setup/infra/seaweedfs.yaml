apiVersion: apps/v1
kind: Deployment
metadata:
  name: seaweedfs
  namespace: core-local
spec:
  replicas: 1
  selector:
    matchLabels:
      app: seaweedfs
  template:
    metadata:
      labels:
        app: seaweedfs
    spec:
      containers:
        - name: seaweedfs
          image: chrislusf/seaweedfs:latest
          command:
            - weed
            - server
            - -dir=/data
            - -master.port=9333
            - -filer
            - -filer.port=8888
            - -s3
            - -s3.port=8333
            - -s3.config=/etc/seaweedfs/s3.json
          ports:
            - name: master
              containerPort: 9333
            - name: filer
              containerPort: 8888
            - name: s3
              containerPort: 8333
          readinessProbe:
            httpGet:
              path: /
              port: 9333
            initialDelaySeconds: 10
            periodSeconds: 5
          volumeMounts:
            - name: data
              mountPath: /data
            - name: s3-config
              mountPath: /etc/seaweedfs
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: seaweedfs-data
        - name: s3-config
          configMap:
            name: seaweedfs-s3-config
---
apiVersion: v1
kind: Service
metadata:
  name: seaweedfs
  namespace: core-local
spec:
  selector:
    app: seaweedfs
  ports:
    - name: s3
      port: 8333
      targetPort: 8333
    - name: filer
      port: 8888
      targetPort: 8888
    - name: master
      port: 9333
      targetPort: 9333
