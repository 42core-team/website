apiVersion: k3d.io/v1alpha5
kind: Simple
metadata:
  name: core-dev
servers: 1
agents: 0
registries:
  create:
    name: registry.localhost
    host: "0.0.0.0"
    hostPort: "5001"
options:
  k3d:
    wait: true
    timeout: "120s"
  k3s:
    extraArgs:
      - arg: --disable=traefik
        nodeFilters:
          - server:*
  kubeconfig:
    updateDefaultKubeconfig: false
    switchCurrentContext: false
